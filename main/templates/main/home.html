<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* TOPBAR */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: #111827;
}

.topbar a {
    color: #cbd5e1;
    text-decoration: none;
}

/* HERO */
.hero {
    display: flex;
    height: 80vh;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

.hero h1 {
    font-size: 42px;
    margin-bottom: 20px;
}

/* BUTTON */
.btn {
    padding: 14px 25px;
    background: #2563eb;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-size: 16px;
}

.btn:hover {
    background: #1d4ed8;
}
</style>
</head>

<body>

<div class="topbar">
    <div><b>TimeTracker</b></div>
    <div>
        <a href="/login/">Login</a>
    </div>
</div>

<div class="hero">
    <h1>Track Your Work Time</h1>
    <a href="/register/" class="btn">Get Started</a>
</div>

</body>
</html>
