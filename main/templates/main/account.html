<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Info</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
}

/* центр страницы */
.wrapper {
    width: 100%;
    padding: 40px 0;
}

/* карточка */
.card {
    width: 520px;
    margin: 0 auto 20px;
    background: #111827;
    padding: 25px;
    border-radius: 16px;
}

/* заголовок */
h2 {
    margin-bottom: 20px;
}

/* строки данных */
.row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0b1220;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 12px;
}

.label {
    width: 120px;
    color: #94a3b8;
}

.value {
    flex: 1;
}

/* кнопки */
.btn {
    padding: 8px 14px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    background: #3b82f6;
    font-size: 14px;
}

.btn:hover {
    background: #2563eb;
}

/* нижний блок — центр через grid */
.bottom {
    width: 520px;
    margin: 0 auto;
    background: #111827;
    padding: 20px;
    border-radius: 16px;

    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
}

/* центр кнопка */
.center {
    justify-self: center;
}

/* правая кнопка */
.right {
    justify-self: end;
}

.secondary {
    background: #64748b;
}

.secondary:hover {
    background: #475569;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- USER INFO -->
    <div class="card">
        <h2>User Info</h2>

        <div class="row">
            <div class="label">Username</div>
            <div class="value">{{ user.username }}</div>
            <a class="btn" href="{% url 'edit_name' %}">Change</a>
        </div>

        <div class="row">
            <div class="label">Email</div>
            <div class="value">{{ user.email }}</div>
            <a class="btn" href="{% url 'edit_email' %}">Change</a>
        </div>

        <div class="row">
            <div class="label">Rate</div>
            <div class="value">{{ user.hourly_rate }}</div>
        </div>
    </div>

    <!-- BOTTOM ACTIONS -->
    <div class="bottom">
        <div></div>

        <a class="btn center" href="{% url 'change_password' %}">
            Change Password
        </a>

        <a class="btn secondary right" href="{% url 'profile' %}">
            Back
        </a>
    </div>

</div>

</body>
</html>
