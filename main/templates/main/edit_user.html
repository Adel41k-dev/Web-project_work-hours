<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit User</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
    margin-bottom: 20px;
    text-align: center;
}

/* LABEL */
.label {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 5px;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
    background: #0f172a;
    color: white;
    outline: none;
}

/* ROW */
.row {
    display: flex;
    gap: 10px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #1d4ed8;
}

/* SMALL INFO */
.hint {
    font-size: 11px;
    color: #64748b;
    margin-bottom: 10px;
}
.bk {
    margin: 20px 0;
    width: 95%;
    padding: 10px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 8px;
    text-align: center;

}
a {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h2>Edit User</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="label">Username</div>
            <input name="username" value="{{ user.username }}">

            <div class="label">Email</div>
            <input name="email" value="{{ user.email }}">

            <!-- 💰 ЗАРПЛАТА -->
            <div class="label">Hourly Rate ($)</div>
            <input name="hourly_rate" value="{{ user.hourly_rate|default:100 }}">

            <div class="hint">
                Default salary: 100$/hour
            </div>

            <div class="label">New Password</div>
            <input type="password" name="password" placeholder="Leave empty if no change">

            <button type="submit">Save Changes</button>
            <tr>
                <div class="bk">
                    <a class="btn secondary right" href="{% url 'admin' %}">
                        Back
                    </a>
                </div>
            </tr>
        </form>

    </div>

</div>

</body>
</html>
