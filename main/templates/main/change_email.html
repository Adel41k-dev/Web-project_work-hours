<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Смена почты</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

.container {
    max-width: 500px;
    margin: 120px auto;
    padding: 20px;
}

.card {
    background: #111827;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0b1220;
    color: white;
}

input:focus {
    border-color: #3b82f6;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #3b82f6;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

a {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #94a3b8;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>Смена почты</h2>

        <form method="post">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Новая почта" required>
            <button type="submit">Обновить</button>
        </form>

        <a href="{% url 'profile' %}">← Назад</a>
    </div>
</div>

</body>
</html>
