<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Change Password</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
}

.card {
    background: #1e293b;
    margin: 100px auto;
    padding: 20px;
    width: 350px;
    border-radius: 12px;
}

input {
    width: 95%;
    margin: 5px 0;

    padding: 10px;
    background: #0f172a;
    border: none;
    color: white;
}

button {
    margin-top: 100px;
    width: 100%;
    padding: 10px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 8px;
}
.bk {
    margin: 20px 0;
    width: 95%;
    padding: 10px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 8px;
    text-align: center;

}
a {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="card">

<h2>Change Password</h2>

<form method="POST">
    {% csrf_token %}

    <input type="password" name="old" placeholder="Old password">
    <input type="password" name="new1" placeholder="New password">
    <input type="password" name="new2" placeholder="Repeat">

    <button type="submit">Save</button>
    <div class="bk">
        <a class="btn secondary right" href="{% url 'profile' %}">
            Back
        </a>
    </div>

</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

</div>

</body>
</html>
