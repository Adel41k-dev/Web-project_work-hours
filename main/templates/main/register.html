<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* CENTER */
.container {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
}

h2 {
    text-align: center;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    background: #0f172a;
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

/* ERROR */
.error {
    color: #ef4444;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h2>Register</h2>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input name="username" placeholder="Username">
            <input name="email" placeholder="Email">
            <input type="password" name="password1" placeholder="Password">
            <input type="password" name="password2" placeholder="Repeat Password">

            <button type="submit">Register</button>
        </form>

        <p style="text-align:center; margin-top:10px;">
            Already have account? <a href="/login/" style="color:#38bdf8;">Login</a>
        </p>

    </div>

</div>

</body>
</html>
